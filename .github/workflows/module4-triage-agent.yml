name: "Module 4 — Triage Agent"

on:
  push:
    paths:
      - 'module4/**'
      - 'shared/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Module 4 agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MOCK_MODE: ${{ secrets.ANTHROPIC_API_KEY == '' && '1' || '0' }}
        run: python module4/triage_agent.py

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module4-output
          path: output/output_module4.json
          if-no-files-found: warn
